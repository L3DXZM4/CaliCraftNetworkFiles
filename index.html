<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modlist Oficial - CaliCraft Network</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --bg-main: #0b0f19;
            --bg-card: #151d30;
            --bg-input: #1e2942;
            --accent-emerald: #10b981;
            /* Verde Esmeralda Minecraft */
            --accent-glow: rgba(16, 185, 129, 0.4);

            /* Colores de Categorías Principales */
            --color-cliente: #3b82f6;
            --color-servidor: #ef4444;
            --color-compartido: #a855f7;

            /* Texto */
            --text-title: #ffffff;
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Encabezado Premium */
        header {
            position: relative;
            background: linear-gradient(rgba(11, 15, 25, 0.85), rgba(11, 15, 25, 0.95)),
                url('https://www.minecraft.net/content/dam/games/minecraft/key-art/Games_Subnav_Minecraft-Wild-Update.jpg');
            background-size: cover;
            background-position: center;
            padding: 5rem 1rem 4rem 1rem;
            text-align: center;
            border-bottom: 3px solid var(--accent-emerald);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }

        header h1 {
            font-size: 3.5rem;
            font-weight: 800;
            color: var(--text-title);
            letter-spacing: -1px;
            text-transform: uppercase;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
            margin-bottom: 0.5rem;
        }

        header h1 span {
            color: var(--accent-emerald);
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1.2rem;
            font-weight: 500;
        }

        .badge-version {
            display: inline-block;
            background: rgba(16, 185, 129, 0.15);
            border: 1px solid var(--accent-emerald);
            color: var(--accent-emerald);
            padding: 0.35rem 1rem;
            border-radius: 2rem;
            font-size: 0.9rem;
            font-weight: 700;
            margin-top: 1rem;
        }

        .container {
            max-width: 1240px;
            margin: 0 auto;
            padding: 3rem 1.5rem;
        }

        /* Dashboard de Estadísticas */
        .stats-dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 1.5rem;
            border-radius: 1.25rem;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-3px);
        }

        .stat-card .number {
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 0.25rem;
        }

        .stat-card.total .number {
            color: var(--accent-emerald);
        }

        .stat-card.client .number {
            color: var(--color-cliente);
        }

        .stat-card.server .number {
            color: var(--color-servidor);
        }

        .stat-card.shared .number {
            color: var(--color-compartido);
        }

        .stat-card .label {
            font-size: 0.9rem;
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Sección de Controles y Filtros */
        .controls-wrapper {
            background: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 2rem;
            border-radius: 1.5rem;
            margin-bottom: 3rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }

        .search-box {
            position: relative;
            width: 100%;
            margin-bottom: 1.5rem;
        }

        .search-box input {
            width: 100%;
            padding: 1.1rem 1.1rem 1.1rem 3.2rem;
            border-radius: 1rem;
            border: 2px solid transparent;
            background: var(--bg-input);
            color: white;
            font-size: 1rem;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--accent-emerald);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        .search-box i {
            position: absolute;
            left: 1.2rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .filter-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            justify-content: center;
        }

        .tab-btn {
            padding: 0.8rem 1.8rem;
            border-radius: 0.75rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
            background: var(--bg-input);
            color: var(--text-main);
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .tab-btn:hover {
            background: #273554;
            transform: translateY(-1px);
        }

        .tab-btn.active[data-cat="all"] {
            background: var(--accent-emerald);
            color: var(--bg-main);
        }

        .tab-btn.active[data-cat="cliente"] {
            background: var(--color-cliente);
            color: white;
        }

        .tab-btn.active[data-cat="servidor"] {
            background: var(--color-servidor);
            color: white;
        }

        .tab-btn.active[data-cat="compartido"] {
            background: var(--color-compartido);
            color: white;
        }

        /* Grid Dinámico de Mods */
        .mod-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
        }

        .mod-card {
            background: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.03);
            padding: 1.75rem;
            border-radius: 1.25rem;
            border-top: 4px solid transparent;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
        }

        .mod-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 30px -10px rgba(0, 0, 0, 0.5);
            border-color: rgba(255, 255, 255, 0.1);
        }

        /* Estilos laterales/superiores según ambiente */
        .mod-card.cliente {
            border-top-color: var(--color-cliente);
        }

        .mod-card.servidor {
            border-top-color: var(--color-servidor);
        }

        .mod-card.compartido {
            border-top-color: var(--color-compartido);
        }

        .mod-card-top {
            margin-bottom: 1.25rem;
        }

        .mod-name {
            font-weight: 700;
            font-size: 1.25rem;
            color: var(--text-title);
            margin-bottom: 0.4rem;
            letter-spacing: -0.3px;
        }

        .mod-file {
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.8rem;
            color: var(--text-muted);
            background: rgba(0, 0, 0, 0.2);
            padding: 0.3rem 0.6rem;
            border-radius: 0.5rem;
            display: inline-block;
            word-break: break-all;
            margin-top: 0.25rem;
        }

        /* Badges de Subcategorías Avanzadas */
        .subcat-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            padding: 0.25rem 0.65rem;
            border-radius: 0.5rem;
            background: rgba(255, 255, 255, 0.06);
            color: #cbd5e1;
            margin-bottom: 0.75rem;
        }

        .mod-card-bottom {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
            padding-top: 1rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Tags principales */
        .tag {
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: 800;
            letter-spacing: 0.5px;
            padding: 0.3rem 0.75rem;
            border-radius: 0.5rem;
        }

        .tag-cliente {
            background: rgba(59, 130, 246, 0.15);
            color: var(--color-cliente);
        }

        .tag-servidor {
            background: rgba(239, 68, 68, 0.15);
            color: var(--color-servidor);
        }

        .tag-compartido {
            background: rgba(168, 85, 247, 0.15);
            color: var(--color-compartido);
        }

        /* Mensaje No Results */
        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            padding: 4rem 2rem;
            background: var(--bg-card);
            border-radius: 1.25rem;
            color: var(--text-muted);
        }

        .no-results i {
            font-size: 3rem;
            margin-bottom: 1rem;
            color: rgba(255, 255, 255, 0.1);
        }

        /* Animaciones suaves */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .mod-card {
            animation: fadeIn 0.4s ease forwards;
        }

        /* Responsividad */
        @media (max-width: 768px) {
            header h1 {
                font-size: 2.5rem;
            }

            .container {
                padding: 1.5rem 1rem;
            }

            .controls-wrapper {
                padding: 1.25rem;
            }
        }

        /* ================= VISTA DE LISTA COMPACTA & BOTÓN COPIAR ================= */
        .filter-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1.25rem;
        }

        .view-toggle-group {
            display: flex;
            background: var(--bg-input);
            padding: 0.3rem;
            border-radius: 0.75rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .toggle-btn {
            padding: 0.5rem 1.2rem;
            border-radius: 0.5rem;
            border: none;
            background: transparent;
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .toggle-btn:hover {
            color: var(--text-main);
        }

        .toggle-btn.active {
            background: var(--bg-card);
            color: var(--accent-emerald);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        .mod-file-wrapper {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 0.25rem;
        }

        .copy-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-muted);
            border-radius: 0.4rem;
            padding: 0.25rem 0.45rem;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .copy-btn:hover {
            background: var(--accent-emerald);
            color: var(--bg-main);
            border-color: var(--accent-emerald);
        }

        .copy-btn.copied {
            background: var(--accent-emerald) !important;
            color: var(--bg-main) !important;
            border-color: var(--accent-emerald) !important;
        }

        /* Modificaciones estructurales del Grid para la Vista de Lista */
        .mod-grid.list-view {
            grid-template-columns: 1fr;
            gap: 0.75rem;
        }

        .mod-grid.list-view .mod-card {
            flex-direction: row;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 1.5rem;
            border-top: none;
            border-left: 4px solid transparent;
            border-radius: 0.75rem;
            gap: 1.5rem;
        }

        .mod-grid.list-view .mod-card:hover {
            transform: translateX(4px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .mod-grid.list-view .mod-card.cliente {
            border-left-color: var(--color-cliente);
        }

        .mod-grid.list-view .mod-card.servidor {
            border-left-color: var(--color-servidor);
        }

        .mod-grid.list-view .mod-card.compartido {
            border-left-color: var(--color-compartido);
        }

        .mod-grid.list-view .mod-card-top {
            margin-bottom: 0;
            display: flex;
            align-items: center;
            gap: 1.5rem;
            flex: 1;
        }

        .mod-grid.list-view .subcat-badge {
            margin-bottom: 0;
            min-width: 145px;
            justify-content: center;
        }

        .mod-grid.list-view .mod-name {
            font-size: 1.1rem;
            margin-bottom: 0;
            flex: 1;
        }

        .mod-grid.list-view .mod-meta {
            margin-top: 0;
        }

        .mod-grid.list-view .mod-file-wrapper {
            margin-top: 0;
        }

        .mod-grid.list-view .mod-card-bottom {
            margin-top: 0;
            padding-top: 0;
            border-top: none;
            width: auto;
        }

        /* Responsividad intermedia para envolver los controles */
        @media (max-width: 992px) {
            .filter-container {
                flex-direction: column;
                justify-content: center;
            }

            .filter-tabs {
                justify-content: center;
            }
        }

        /* Adaptación móvil total para la lista compacta */
        @media (max-width: 768px) {
            .mod-grid.list-view .mod-card {
                flex-direction: column;
                align-items: flex-start;
                gap: 0.75rem;
                padding: 1.25rem;
                border-left: none;
                border-top: 4px solid transparent;
            }

            .mod-grid.list-view .mod-card.cliente {
                border-top-color: var(--color-cliente);
            }

            .mod-grid.list-view .mod-card.servidor {
                border-top-color: var(--color-servidor);
            }

            .mod-grid.list-view .mod-card.compartido {
                border-top-color: var(--color-compartido);
            }

            .mod-grid.list-view .mod-card-top {
                flex-direction: column;
                align-items: flex-start;
                gap: 0.5rem;
                width: 100%;
            }

            .mod-grid.list-view .subcat-badge {
                justify-content: flex-start;
                min-width: auto;
            }

            .mod-grid.list-view .mod-card-bottom {
                width: 100%;
                justify-content: space-between;
                padding-top: 0.75rem;
                border-top: 1px solid rgba(255, 255, 255, 0.05);
            }
        }

        /* ================= BOTÓN DE MODRINTH Y AJUSTES DE ACCIONES ================= */
        .mod-actions {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }

        /* El botón premium con el color oficial de Modrinth */
        .modrinth-btn {
            background: rgba(27, 217, 106, 0.06);
            border: 1px solid rgba(27, 217, 106, 0.2);
            color: #1bd96a;
            /* Verde brillante de la marca Modrinth */
            border-radius: 0.5rem;
            padding: 0.3rem 0.75rem;
            font-size: 0.8rem;
            font-weight: 700;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .modrinth-btn:hover {
            background: #00af5c;
            /* Color de acento sólido al pasar el mouse */
            color: #0b0f19;
            /* Fondo oscuro para contraste */
            border-color: #00af5c;
            box-shadow: 0 0 12px rgba(27, 217, 106, 0.3);
            transform: translateY(-1px);
        }

        .modrinth-icon {
            width: 13px;
            height: 13px;
            fill: currentColor;
            display: inline-block;
            vertical-align: middle;
        }

        /* Ajuste de empaquetado para mantener el nombre del archivo separado de los botones */
        .mod-file-wrapper {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 0.3rem;
        }

        /* En la vista de lista compacta, los botones se alinean horizontalmente al lado del archivo */
        .mod-grid.list-view .mod-file-wrapper {
            flex-direction: row;
            align-items: center;
            gap: 1rem;
        }

        .mod-grid.list-view .mod-actions {
            margin-top: 0;
        }

        .modrinth-icon {
            width: 14px;
            height: 14px;
            fill: currentColor;
            display: inline-block;
            vertical-align: middle;
            flex-shrink: 0;
            /* Evita que el SVG se deforme en pantallas pequeñas */
        }
    </style>
</head>

<body>

    <header>
        <h1><span>CaliCraft</span> Modlist</h1>
        <p class="subtitle">Descubre los componentes y características tecnológicas integradas en la Network</p>
        <div class="badge-version"></i> Minecraft 1.21.1 — NeoForge</div>
    </header>

    <div class="container">

        <div class="stats-dashboard">
            <div class="stat-card total">
                <div class="number" id="statTotal">0</div>
                <div class="label">Mods Totales</div>
            </div>
            <div class="stat-card client">
                <div class="number" id="statClient">0</div>
                <div class="label">Lado Cliente</div>
            </div>
            <div class="stat-card server">
                <div class="number" id="statServer">0</div>
                <div class="label">Solo Servidor</div>
            </div>
            <div class="stat-card shared">
                <div class="number" id="statShared">0</div>
                <div class="label">Compartidos</div>
            </div>
        </div>

        <div class="controls-wrapper">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="modSearch" placeholder="Buscar por nombre de mod o archivo .jar...">
            </div>
            <div class="filter-container">
                <div class="filter-tabs">
                    <button class="tab-btn active" data-cat="all" onclick="filterCategory('all')">
                        <i class="fas fa-cubes"></i> Todos
                    </button>
                    <button class="tab-btn" data-cat="cliente" onclick="filterCategory('cliente')">
                        <i class="fas fa-desktop"></i> Requeridos en Cliente
                    </button>
                    <button class="tab-btn" data-cat="servidor" onclick="filterCategory('servidor')">
                        <i class="fas fa-server"></i> Solo Servidor
                    </button>
                    <button class="tab-btn" data-cat="compartido" onclick="filterCategory('compartido')">
                        <i class="fas fa-network-wired"></i> Compartidos (Ambos lados)
                    </button>
                </div>

                <div class="view-toggle-group">
                    <button class="toggle-btn active" id="viewGrid" onclick="changeView('grid')">
                        <i class="fas fa-th-large"></i> Rejilla
                    </button>
                    <button class="toggle-btn" id="viewList" onclick="changeView('list')">
                        <i class="fas fa-list"></i> Lista Compacta
                    </button>
                </div>
            </div>
        </div>

        <div class="mod-grid" id="modGrid">
        </div>
    </div>

    <script>
        // Mapeo exhaustivo y sincronizado de los componentes de la CaliCraft Network
        const mods = [
            // ==================== LADO CLIENTE (39) ====================
            { name: "Ambient Environment", type: "cliente", subcat: "Visual/Estética", file: "AmbientEnvironment-neoforge-1.21.1-18.0.0.2.jar" },
            { name: "Ambient Sounds 6", type: "cliente", subcat: "Inmersión Sonora", file: "AmbientSounds_NEOFORGE_v6.3.8_mc1.21.1.jar" },
            { name: "Better Ping Display", type: "cliente", subcat: "Interfaz/UI", file: "BetterPingDisplay-1.21.1-1.1.jar" },
            { name: "Camera Overhaul", type: "cliente", subcat: "Visual/Estética", file: "CameraOverhaul-v2.1.1-neoforge+mc[1.21-1.21.1].jar" },
            { name: "CraftPresence (Discord RPC)", type: "cliente", subcat: "Integración Social", file: "CraftPresence-2.7.1+1.21.1-neoforge.jar" },
            { name: "Custom Player Models", type: "cliente", subcat: "Visual/Estética", file: "CustomPlayerModels-1.21-0.6.26a.jar" },
            { name: "Drip Sounds", type: "cliente", subcat: "Inmersión Sonora", file: "Drip Sounds-0.5.2+1.21.8-NeoForge.jar" },
            { name: "EMI Professions", type: "cliente", subcat: "Interfaz/Guías", file: "EMIProfessions-neoforge-1.21.1-1.0.3.jar" },
            { name: "Immersive UI", type: "cliente", subcat: "Interfaz/UI", file: "ImmersiveUI-NEOFORGE-0.3.3+1.21.1.jar" },
            { name: "Traveler's Titles", type: "cliente", subcat: "Exploración/RPG", file: "TravelersTitles-1.21.1-NeoForge-5.1.3.jar" },
            { name: "UniLib", type: "cliente", subcat: "Librería", file: "UniLib-1.2.1+1.21.1-neoforge.jar" },
            { name: "Yung's Menu Tweaks", type: "cliente", subcat: "Interfaz/UI", file: "YungsMenuTweaks-1.21.1-NeoForge-2.1.2.jar" },
            { name: "Distraction Free Recipes", type: "cliente", subcat: "Interfaz/UI", file: "distraction_free_recipes-neoforge-1.2.1-1.21.1.jar" },
            { name: "Drippy Loading Screen", type: "cliente", subcat: "Interfaz/UI", file: "drippyloadingscreen_neoforge_3.1.2_MC_1.21.1.jar" },
            { name: "Dynamic FPS", type: "cliente", subcat: "Optimización", file: "dynamic-fps-3.11.4+minecraft-1.21.0-neoforge.jar" },
            { name: "Elytra Physics", type: "cliente", subcat: "Movilidad/Físicas", file: "elytra_physics-neoforge-2.3_mc1.20.5-1.21.1.jar" },
            { name: "EMI Let's Do Compat", type: "cliente", subcat: "Interfaz/Guías", file: "emi-letsdo-compat-2.0.1+1.21.1+neoforge.jar" },

        let currentCategory = 'all';
        let searchQuery = '';

        const modGrid = document.getElementById('modGrid');
        const modSearch = document.getElementById('modSearch');

        // Calcula las métricas globales dinámicamente basándose en la base de datos real
        function calculateMetrics() {
            document.getElementById('statTotal').innerText = mods.length;
            document.getElementById('statClient').innerText = mods.filter(m => m.type === 'cliente').length;
            document.getElementById('statServer').innerText = mods.filter(m => m.type === 'servidor').length;
            document.getElementById('statShared').innerText = mods.filter(m => m.type === 'compartido').length;
        }

        // Variables globales de control de vista
        let currentView = 'grid';

        function changeView(view) {
            currentView = view;
            const modGrid = document.getElementById('modGrid');

            document.getElementById('viewGrid').classList.remove('active');
            document.getElementById('viewList').classList.remove('active');

            if (view === 'grid') {
                document.getElementById('viewGrid').classList.add('active');
                modGrid.classList.remove('list-view');
            } else {
                document.getElementById('viewList').classList.add('active');
                modGrid.classList.add('list-view');
            }
        }

        // Sistema dinámico para copiar al portapapeles con feedback visual
        function copyToClipboard(text, btn) {
            navigator.clipboard.writeText(text).then(() => {
                const originalHTML = btn.innerHTML;
                btn.innerHTML = `<i class="fas fa-check"></i>`;
                btn.classList.add('copied');

                setTimeout(() => {
                    btn.innerHTML = originalHTML;
                    btn.classList.remove('copied');
                }, 1500);
            }).catch(err => {
                console.error('Error al intentar copiar al portapapeles: ', err);
            });
        }

        // Función de Renderizado con el LOGO OFICIAL de Modrinth
        function renderMods() {
            modGrid.innerHTML = '';

            const filtered = mods.filter(mod => {
                const matchesCategory = currentCategory === 'all' || mod.type === currentCategory;
                const matchesSearch = mod.name.toLowerCase().includes(searchQuery.toLowerCase()) ||
                    mod.file.toLowerCase().includes(searchQuery.toLowerCase());
                return matchesCategory && matchesSearch;
            });

            if (filtered.length === 0) {
                modGrid.innerHTML = `
                    <div class="no-results">
                        <i class="fas fa-ghost"></i>
                        <p>No se encontraron mods que coincidan con los criterios de búsqueda.</p>
                    </div>
                `;
                return;
            }

            filtered.forEach(mod => {
                const card = document.createElement('div');
                card.className = `mod-card ${mod.type}`;

                let tipoLegible = "Cliente";
                if (mod.type === "servidor") tipoLegible = "Solo Servidor";
                if (mod.type === "compartido") tipoLegible = "Compartido";

                // Enlace dinámico codificado para buscar en Modrinth
                const modrinthSearchUrl = `https://modrinth.com/mods?q=${encodeURIComponent(mod.name)}`;

                card.innerHTML = `
                    <div class="mod-card-top">
                        <span class="subcat-badge"><i class="fas fa-tag"></i> ${mod.subcat}</span>
                        <div class="mod-name">${mod.name}</div>
                        <div class="mod-meta">
                            <div class="mod-file-wrapper">
                                <span class="mod-file"><i class="far fa-file-archive"></i> ${mod.file}</span>
                                <div class="mod-actions">
                                    <button class="copy-btn" onclick="copyToClipboard('${mod.file}', this)" title="Copiar nombre exacto del archivo .jar">
                                        <i class="far fa-copy"></i>
                                    </button>
                                    <a href="${modrinthSearchUrl}" target="_blank" class="modrinth-btn" title="Buscar '${mod.name}' en Modrinth">
                                        <!-- SVG Oficial de Modrinth integrado correctamente -->
                                        <svg class="modrinth-icon" viewBox="0 0 512 514" xmlns="http://www.w3.org/2000/svg">
                                            <path fill="currentColor" fill-rule="evenodd" d="M503.16 323.56c11.39-42.09 12.16-87.65.04-132.8C466.57 54.23 326.04-26.8 189.33 9.78 83.81 38.02 11.39 128.07.69 230.47h43.3c10.3-83.14 69.75-155.74 155.76-178.76 106.3-28.45 215.38 28.96 253.42 129.67l-42.14 11.27c-19.39-46.85-58.46-81.2-104.73-95.83l-7.74 43.84c36.53 13.47 66.16 43.84 77 84.25 15.8 58.89-13.62 119.23-67 144.26l11.53 42.99c70.16-28.95 112.31-101.86 102.34-177.02l41.98-11.23a210.2 210.2 0 0 1-3.86 84.16z" clip-rule="evenodd"></path>
                                            <path fill="currentColor" d="M321.99 504.22C185.27 540.8 44.75 459.77 8.11 323.24A257.6 257.6 0 0 1 0 275.46h43.27c1.09 11.91 3.2 23.89 6.41 35.83 3.36 12.51 7.77 24.46 13.11 35.78l38.59-23.15c-3.25-7.5-5.99-15.32-8.17-23.45-24.04-89.6 29.2-181.7 118.92-205.71 17-4.55 34.1-6.32 50.8-5.61L255.19 133c-10.46.05-21.08 1.42-31.66 4.25-66.22 17.73-105.52 85.7-87.78 151.84 1.1 4.07 2.38 8.04 3.84 11.9l49.35-29.61-14.87-39.43 46.6-47.87 58.9-12.69 17.05 20.99-27.15 27.5-23.68 7.45-16.92 17.39 8.29 23.07s16.79 17.84 16.82 17.85l23.72-6.31 16.88-18.54 36.86-11.67 10.98 24.7-38.03 46.63-63.73 20.18-28.58-31.82-49.82 29.89c25.54 29.08 63.94 45.23 103.75 41.86l11.53 42.99c-59.41 7.86-117.44-16.73-153.49-61.91l-38.41 23.04c50.61 66.49 138.2 99.43 223.97 76.48 61.74-16.52 109.79-58.6 135.81-111.78l42.64 15.5c-30.89 66.28-89.84 118.94-166.07 139.34"></path>
                                        </svg>
                                        Modrinth
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="mod-card-bottom">
                        <span class="tag tag-${mod.type}">${tipoLegible}</span>
                    </div>
                `;
                modGrid.appendChild(card);
            });
        }

        // Manejo del cambio de pestañas de filtrado
        function filterCategory(cat) {
            currentCategory = cat;

            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.getAttribute('data-cat') === cat) {
                    btn.classList.add('active');
                }
            });

            renderMods();
        }

        // Listener en tiempo real para el cuadro de búsqueda inteligente
        modSearch.addEventListener('input', (e) => {
            searchQuery = e.target.value;
            renderMods();
        });

        // Orquestación Inicial al cargar la ventana
        window.onload = () => {
            calculateMetrics();
            renderMods();
        };
    </script>
</body>

</html>
